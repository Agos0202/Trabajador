services:
  - type: web
    name: trabajo-comuna-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_DB_PUBLIC_ID
        value: comuna_asistencias_db
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
